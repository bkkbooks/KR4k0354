body:
  text: 汲冢書鈔太康三年汲郡人不準盜發魏襄王墓或言安釐王冢得竹書數十車其紀年十三篇記夏以來至周幽王為犬戎所滅以事接之三家分仍述魏事至安釐王之二十年蓋魏國之史書大略與春秋皆多相應其中經傳大異則云夏年多殷益干啟位啟殺之太甲殺伊尹文丁殺季歷自周受命至穆王百年非穆王壽百歲也幽王既沒有共伯和者攝行天子事非二相共和也晉書束晳傳堯德衰為舜所囚舜囚堯復偃塞丹朱使父子不得相見也史記五帝本紀張守節正義引竹書禹居陽翟漢書地理志注臣瓚引汲郡古文下邳古文以為嶧陽有鐵官吳古文以為震澤南江在南東入海揚州川歷陵古文以為傳淺原居延古文以為流沙竟陵古文云內方山鄖鄉楚鄖公邑太康居㘰尋羿亦居之殷有應國並同上伊尹交干末喜而遂問夏路史後紀卷二羅苹注引紀年汲冢古文云盤庚自奄遷于殷殷在鄴南三十里尚書序盤庚五遷將治亳殷舊說以為居亳亳殷在河南孔子壁中尚書云將始宅殷是與古文不同也尚書盤庚孔頴達正義引束晳周武王親禽受於南單之臺徐堅初學記卷二十四引束晳汲冢書鈔成康之際天下安寧刑措四十年不用文選卷三十五漢武帝賢良詔注引紀年晉成公滅荀以賜大夫原氏黯是為荀叔文公城荀漢書地理志注臣瓚引汲郡古文顯王九年東周惠公傑薨史記周本紀徐廣音義引紀年趙武靈王十二年立燕公子職同上趙惠文王子何者吳廣之甥娃嬴之子也史記趙世家司馬貞索隱引束廣微趙太后終三十有奇同上梁惠王發逢忌之藪以賜民漢書地理志注臣瓚引汲郡古文翟章救鄭至于南屈惠王之六年自安邑遷於大梁並同上衛將軍文子為子南彌牟其後有子南固子南勁漢書武帝紀注臣瓚引汲冢古文勁朝于衛惠成王如衛命子南為侯同上引紀年梁惠王九年晉取泣氏羅泌路史國名紀引紀年梁惠王後元十三年會齊威王于鄄四月威王封田嬰于薛十月齊城薛十四年薛子嬰來朝史記田齊世家索隱引紀年梁惠王十五年遣將龍賈築陽池以備秦李吉甫元和郡縣志引紀年齊師伐趙東鄙圍中牟酈道元水經注引紀年易經二篇與周易上下經同晉書束晳傳易繇陰陽卦二篇與周易略同繇辭則易卦下易經一篇似說卦而異公孫段二篇公孫段與邵陟論易國語三篇言楚晉事名三篇似禮記又似爾雅論語師春一篇書左傳卜筮師春似是造書者姓名也瑣語十一篇諸國卜夢妖怪相書也梁丘藏一篇先敘魏之世數次言丘藏金玉事繳書二篇論弋射法生封一篇帝王所封大歷一篇鄒子談天類也穆天子傳五篇言周穆王游行四海見帝臺西王母圖詩一篇畫贊之屬也又雜書十九篇周食田法周書論楚事周穆王美人盛姬死事大凡七十五篇七篇簡書折壞不識名題又得銅劍一枚長二尺五寸漆書皆科斗字並同上
